runtime:
  reasoning_mode: "3d"
  log_level: "INFO"

depth_estimation:
  model_name: "Intel/dpt-hybrid-midas"

camera:
  include_camera_object: true
  camera_id: 0
  width_m: 0.5
  depth_m: 0.5

realsense:
  width: 1280
  height: 720
  fps: 30

detection:
  enabled: true
  model_weights: "D:/nassim/qxg_platform/models/yolo11x.pt"
  model_urls:
    yolo11x.pt: "https://github.com/ultralytics/assets/releases/download/v8.3.0/yolo11x.pt"
    yolo12n.pt: "https://github.com/ultralytics/assets/releases/download/v8.3.0/yolo12n.pt"
    yolov8n.pt: "https://github.com/ultralytics/assets/releases/download/v8.3.0/yolov8n.pt"
  classes: ["person", "car", "bus", "motorcycle", "truck", "bicycle"]
  confidence_threshold: 0.6
  duplicate_iou_threshold: 0.85
  image_size: 1280
  persist_tracks: true
  tracker_config: "configs/slow_tracker.yaml"

analysis:
  qtc_slack: 0.1
  algebras:
    RA: true
    RCC4: false
    QTC: true
    distance: true
    speed: false
  distance_thresholds:
    very_close: 0.5
    close: 7.5
    normal: 10.0
    far: 20.0

relevance:
  enabled: false
  mode: "rules"

visualization:
  enabled: true
  window_name: "QXG Platform"

recording:
  enabled: false
  output_dir: "recordings"
  depth_scale: 1000.0
  image_quality: 95

qxg_export:
  enabled: false
  output_dir: "qxg_exports"

qualinet:
  enabled: false
  mode: "model"
  auto_download: true
  allow_geometry_fallback: true
  ra_model_path: "models/qualinet/ra_model.pth"
  qdc_model_path: "models/qualinet/qdc_model.pth"
  ra_model_url: ""
  qdc_model_url: ""
  ra_labels:
    - "left_above"
    - "left_overlap"
    - "left_below"
    - "overlap_above"
    - "overlap_overlap"
    - "overlap_below"
    - "right_above"
    - "right_overlap"
    - "right_below"
  qdc_labels: ["very close", "close", "normal", "far"]
  image_size: 224
